name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - beta

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: vite-frontend/package-lock.json

      - name: Install dependencies
        working-directory: vite-frontend
        run: npm ci

      - name: Audit production dependencies
        working-directory: vite-frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        working-directory: vite-frontend
        env:
          VITE_APP_VERSION: ci
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test and package
        working-directory: springboot-backend
        run: mvn --batch-mode verify -Drevision=ci

  gost:
    name: GOST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache-dependency-path: |
            go-gost/go.sum
            go-gost/x/go.sum

      - name: Test and vet root module
        working-directory: go-gost
        run: |
          go test ./...
          go vet ./...

      - name: Test and vet nested module
        working-directory: go-gost/x
        run: |
          go test ./...
          go vet ./...
