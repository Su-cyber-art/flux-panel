name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: su-cyber-art
  GO_VERSION: "1.26.5"
  NODE_VERSION: "24"

jobs:
  prepare:
    name: Validate release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      prerelease: ${{ steps.version.outputs.prerelease }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Parse semantic version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Unsupported release tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Refuse to mutate an existing release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists and is immutable." >&2
            exit 1
          fi

  build-gost:
    name: Build GOST binaries
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go-gost/go.sum
            go-gost/x/go.sum

      - name: Test root module
        working-directory: go-gost
        run: go test ./...

      - name: Test nested module
        working-directory: go-gost/x
        run: go test ./...

      - name: Vet modules
        shell: bash
        run: |
          (cd go-gost && go vet ./...)
          (cd go-gost/x && go vet ./...)

      - name: Build release binaries
        working-directory: go-gost
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o gost-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o gost-arm64 .

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: gost-binaries
          if-no-files-found: error
          path: |
            go-gost/gost-amd64
            go-gost/gost-arm64

  build-frontend:
    name: Verify and publish frontend
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: vite-frontend/package-lock.json

      - name: Install, audit, and build
        working-directory: vite-frontend
        env:
          VITE_APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: vite-frontend
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/flux-panel-frontend:${{ needs.prepare.outputs.version }}
            ${{ needs.prepare.outputs.prerelease == 'false' && format('{0}/{1}/flux-panel-frontend:latest', env.REGISTRY, env.IMAGE_NAMESPACE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-backend:
    name: Verify and publish backend
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        working-directory: springboot-backend
        run: mvn --batch-mode verify -Drevision=${{ needs.prepare.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: springboot-backend
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/flux-panel-api:${{ needs.prepare.outputs.version }}
            ${{ needs.prepare.outputs.prerelease == 'false' && format('{0}/{1}/flux-panel-api:latest', env.REGISTRY, env.IMAGE_NAMESPACE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create immutable GitHub release
    needs:
      - prepare
      - build-gost
      - build-frontend
      - build-backend
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download GOST binaries
        uses: actions/download-artifact@v4
        with:
          name: gost-binaries
          path: artifacts

      - name: Prepare versioned release assets
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          chmod +x artifacts/gost-amd64 artifacts/gost-arm64
          cp install.sh panel_install.sh gost.sql artifacts/
          cp docker-compose-v4.yml docker-compose-v6.yml artifacts/
          cp docs/mysql-5.7-to-8.4.md artifacts/mysql-5.7-to-8.4.md
          sed -i "s/__FLUX_VERSION__/${RELEASE_TAG}/g" artifacts/install.sh artifacts/panel_install.sh
          sed -i "s|\${APP_VERSION:-latest}|${VERSION}|g" \
            artifacts/docker-compose-v4.yml artifacts/docker-compose-v6.yml

      - name: Publish release once
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          release_flags=()
          if [[ "$PRERELEASE" == "true" ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            artifacts/gost-amd64 \
            artifacts/gost-arm64 \
            artifacts/install.sh \
            artifacts/panel_install.sh \
            artifacts/docker-compose-v4.yml \
            artifacts/docker-compose-v6.yml \
            artifacts/gost.sql \
            artifacts/mysql-5.7-to-8.4.md \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "Release ${VERSION}" \
            "${release_flags[@]}"
